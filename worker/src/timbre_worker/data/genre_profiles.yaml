# Genre Profile Database
# Defines musical characteristics, typical instrumentation, and narrative structures for each genre

classical:
  display_name: "Classical"
  tempo_range: [40, 120]
  typical_tempos: [60, 72, 90, 108]
  meters: ["4/4", "3/4", "6/8", "2/4"]
  narrative_structure: "harmonic_driven"
  vocal_prevalence: 0.3  # 30% of classical has vocals (opera, choral)
  energy_profile: "dramatic_arc"  # Builds and releases dramatically
  typical_keys: ["C major", "D major", "E-flat major", "F major", "G major", "A major", "A minor", "D minor", "E minor"]

  layers:
    rhythm: 0  # Classical rarely emphasizes drums
    bass: 1    # Double bass, cello
    harmony: 6 # Strings, woodwinds creating harmonic foundation
    lead: 3    # Violin, flute, oboe solos
    textures: 2 # Atmospheric strings, sustained winds
    vocals: 0  # Default 0, increases if vocal keywords detected

  instruments:
    harmony: ["violin section", "viola section", "woodwind ensemble", "piano", "harp"]
    lead: ["solo violin", "solo flute", "solo oboe", "solo clarinet", "french horn"]
    bass: ["cello section", "double bass section", "bassoon"]
    textures: ["string tremolo", "sustained woodwinds"]
    vocals: ["soprano", "tenor", "choir", "opera vocals"]

  keywords: ["classical", "orchestra", "symphony", "concerto", "chamber", "baroque", "romantic", "violin", "piano concerto"]

